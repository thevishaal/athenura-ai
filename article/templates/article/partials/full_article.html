<div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 space-y-6">

    <h1 class="text-3xl font-bold text-cyan-400">
        {{ article.title }}
    </h1>

    <p class="text-gray-300">
        {{ article.introduction }}
    </p>

    {% for sec in article.sections %}
    <div>
        <h2 class="text-xl font-semibold mt-6">{{ sec.heading }}</h2>
        <p class="text-gray-400 mt-2">{{ sec.content }}</p>
    </div>
    {% endfor %}

    <div class="border-t border-slate-700 pt-4">
        <h3 class="font-semibold">Conclusion</h3>
        <p class="text-gray-400">{{ article.conclusion }}</p>
    </div>

</div>
