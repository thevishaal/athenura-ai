<div class="space-y-6">

    <!-- Title -->
    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
        <h2 class="text-2xl font-bold text-cyan-400">
            {{ data.title }}
        </h2>
    </div>

    <!-- Structure -->
    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
        <h3 class="mb-4 font-semibold">Content Structure</h3>

        {% for item in data.content_structure %}
        <div class="p-4 mb-3 bg-slate-900 rounded-lg border border-slate-700">
            <h4 class="font-semibold">{{ item.heading }}</h4>
            <p class="text-gray-400 text-sm">{{ item.description }}</p>
        </div>
        {% endfor %}
    </div>

    <!-- Points -->
    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
        <h3 class="mb-4 font-semibold">Key Points</h3>

        {% for p in data.key_discussion_points %}
        <div class="p-3 bg-slate-900 rounded-lg mb-2 border border-slate-700">
            {{ p }}
        </div>
        {% endfor %}
    </div>

    <!-- Button -->
    <form
        hx-post="{% url 'generate_article' %}"
        hx-target="#output"
        hx-swap="innerHTML"
    >
    {% csrf_token %}
        <input type="hidden" name="title" value="{{ data.title }}">
        <input type="hidden" name="structure" value='{{ data.content_structure|escapejs }}'>
        <input type="hidden" name="tone" value="{{ tone }}">
        <input type="hidden" name="length" value="{{ length }}">
        <input type="hidden" name="audience" value="{{ audience }}">

        <button class="w-full bg-green-500 hover:bg-green-600 p-3 rounded-xl">
            ✨ Write Full Draft
        </button>
    </form>

</div>
