<div class="space-y-6">

    <!-- Back -->
    <button 
        hx-get="{% url 'caption' %}"
        hx-target="#main-container"
        hx-swap="innerHTML"
        class="text-blue-500 text-sm underline hover:text-blue-700">
        ← Generate Again
    </button>

    <h2 class="text-2xl font-bold">Generated Captions ✨</h2>

    {% if data.captions %}
        {% for item in data.captions %}
        <div class="bg-white p-5 rounded-xl shadow border hover:shadow-lg transition relative group">

            <!-- Copy Button -->
            <button 
                onclick="copyText(this)"
                class="absolute top-3 right-3 text-xs bg-gray-800 text-white px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition">
                Copy
            </button>

            <!-- Caption -->
            <p class="text-lg font-medium mb-3">
                {{ item.text }}
            </p>

            <!-- Hashtags -->
            <div class="flex flex-wrap gap-2 mb-3">
                {% for tag in item.hashtags %}
                <span class="bg-gray-100 px-3 py-1 rounded-full text-sm">
                    {{ tag }}
                </span>
                {% endfor %}
            </div>

            <!-- Copy Hashtags -->
            <button 
                onclick="copyTags(this)"
                class="text-xs text-blue-500 hover:underline">
                Copy Hashtags
            </button>

        </div>
        {% endfor %}
    {% else %}
        <!-- Empty State -->
        <div class="text-center text-gray-500">
            No captions generated 😢
        </div>
    {% endif %}

</div>

<!-- JS -->
<script>
function copyText(btn) {
    const text = btn.parentElement.querySelector("p").innerText;
    navigator.clipboard.writeText(text);
    btn.innerText = "Copied!";
    setTimeout(() => btn.innerText = "Copy", 1500);
}

function copyTags(btn) {
    const tags = [...btn.parentElement.querySelectorAll("span")]
        .map(el => el.innerText)
        .join(" ");

    navigator.clipboard.writeText(tags);
    btn.innerText = "Copied!";
    setTimeout(() => btn.innerText = "Copy Hashtags", 1500);
}
</script>
